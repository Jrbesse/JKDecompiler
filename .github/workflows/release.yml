name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: dotnet publish src/JKDecompiler.UI/JKDecompiler.UI.csproj -c Release -r ${{ matrix.os == 'windows-latest' && 'win-x64' || 'linux-x64' }} --self-contained -o ./output
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: Compress-Archive -Path ./output/* -DestinationPath ./JKDecompiler-win-x64.zip
      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czvf JKDecompiler-linux-x64.tar.gz -C ./output .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JKDecompiler-${{ matrix.os }}
          path: |
            *.zip
            *.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
     contents: write
     id-token: write
     packages: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
